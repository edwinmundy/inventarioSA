<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cajeros</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .admin-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .cajero-admin {
            border-left: 4px solid #667eea;
            background: linear-gradient(to right, #eef2ff, white);
            position: relative;
        }
        .cajero-admin::after {
            content: '🔒 NO EDITABLE';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.7rem;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <h1>👤 Gestión de Cajeros</h1>
                <div id="user-info"></div>
            </div>
            <nav class="main-nav" id="main-nav"></nav>
        </header>

        <main>
            <div class="two-column-layout">
                <!-- FORMULARIO -->
                <div class="form-section">
                    <div class="card">
                        <h2 id="form-cajero-titulo">Nuevo Cajero</h2>
                        <!-- autocomplete="off" en el form + novalidate para evitar validación nativa que pueda activar autocompletado -->
                        <form id="form-cajero" onsubmit="guardarCajero(event)" autocomplete="off" novalidate>
                            
                            <!-- Campos falsos para engañar al navegador - POSICIONADOS FUERA DEL VIEWPORT -->
                            <input type="text" name="fake_username" style="position:absolute;left:-9999px;opacity:0;" tabindex="-1" aria-hidden="true">
                            <input type="password" name="fake_password" style="position:absolute;left:-9999px;opacity:0;" tabindex="-1" aria-hidden="true">
                            
                            <input type="hidden" id="cajero-id">
                            
                            <div class="form-group">
                                <label>Nombre Completo:</label>
                                <!-- autocomplete="new-password" es más efectivo que "off" en campos de texto para algunos navegadores -->
                                <input type="text" id="cajero-nombre" required placeholder="Ej: Juan Pérez" 
                                       autocomplete="new-password" 
                                       autocorrect="off" 
                                       autocapitalize="off" 
                                       spellcheck="false"
                                       data-lpignore="true"
                                       data-form-type="other">
                            </div>
                            
                            <div class="form-group">
                                <label>RUT:</label>
                                <input type="text" id="cajero-rut" required placeholder="12.345.678-9" 
                                       pattern="[0-9]{1,2}\.[0-9]{3}\.[0-9]{3}-[0-9kK]{1}" 
                                       autocomplete="new-password" 
                                       autocorrect="off" 
                                       autocapitalize="off" 
                                       spellcheck="false"
                                       data-lpignore="true"
                                       data-form-type="other">
                            </div>
                            
                            <div class="form-group">
                                <label>Turno:</label>
                                <select id="cajero-turno" required autocomplete="off">
                                    <option value="T1">T1</option>
                                    <option value="T2">T2</option>
                                    <option value="T3">T3</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Código de Cajero:</label>
                                <input type="text" id="cajero-codigo" required placeholder="Utilice su mismo código de caja" 
                                       autocomplete="new-password" 
                                       autocorrect="off" 
                                       autocapitalize="off" 
                                       spellcheck="false"
                                       data-lpignore="true"
                                       data-form-type="other">
                            </div>
                            
                            <div class="form-group">
                                <label>Contraseña:</label>
                                <!-- type="text" con masking visual es más seguro contra gestores de contraseñas que type="password" -->
                                <input type="password" id="cajero-password" placeholder="Ingrese su clave de caja" 
                                       autocomplete="new-password" 
                                       autocorrect="off" 
                                       autocapitalize="off" 
                                       spellcheck="false"
                                       data-lpignore="true"
                                       data-form-type="other">
                            </div>
                            
                            <div class="form-group">
                                <label>Cargo:</label>
                                <select id="cajero-cargo" required autocomplete="off">
                                    <option value="Cajero Multifuncional">Cajero Multifuncional</option>
                                    <option value="Cajero de Operaciones">Cajero de Operaciones</option>
                                    <option value="Cajero de Procesos">Cajero de Procesos</option>
                                    <option value="Encargado">Encargado</option>
                                    <option value="Corporativo">Corporativo</option>
                                </select>
                            </div>
                            
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">💾 Guardar Cajero</button>
                                <button type="button" onclick="limpiarFormularioCajero()" class="btn-secondary">Limpiar</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- LISTA -->
                <div class="list-section">
                    <div class="card">
                        <div class="list-header">
                            <h2>Lista de Cajeros</h2>
                            <span class="badge" id="contador-cajeros">0 activos</span>
                        </div>
                        
                        <div class="search-box">
                            <input type="text" id="buscar-cajero" placeholder="🔍 Buscar por nombre, código o cargo..." 
                                   onkeyup="filtrarCajeros()" 
                                   autocomplete="off"
                                   autocorrect="off"
                                   autocapitalize="off"
                                   spellcheck="false">
                        </div>
                        
                        <div id="debug-info" style="font-size:0.8rem;color:#64748b;margin-bottom:10px;padding:8px;background:#f1f5f9;border-radius:4px;display:none;"></div>
                        
                        <div class="cajeros-list" id="lista-cajeros"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Solo inicializar si no hay datos (primera vez)
            if (!localStorage.getItem('inventario_cajeros')) {
                console.log('Primera vez: inicializando datos...');
                inicializarDatos();
            }
            
            // Verificar sesión
            if (!verificarSesion()) return;
            
            // Cargar cajeros
            cargarCajeros();
            
            // Aplicar protecciones adicionales contra autocompletado
            aplicarAntiAutocompletado();
        });
        
        // Función para bloquear autocompletado de forma agresiva
        function aplicarAntiAutocompletado() {
            const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
            
            inputs.forEach(input => {
                // Prevenir que el navegador guarde datos
                input.setAttribute('autocomplete', 'new-password');
                
                // Deshabilitar pegado de contraseñas guardadas (opcional, quitar si necesitan pegar)
                input.addEventListener('paste', (e) => {
                    // Solo permitir pegado manual, no autocompletado
                    if (e.clipboardData.types.includes('text/plain')) {
                        return true;
                    }
                });
                
                // Limpiar atributos que los gestores de contraseñas usan para identificar campos
                input.addEventListener('focus', () => {
                    input.removeAttribute('readonly');
                });
                
                // Prevenir que el navegador sugiera contraseñas al hacer clic
                input.addEventListener('click', (e) => {
                    if (input.type === 'password') {
                        // Fuerza al navegador a no mostrar sugerencias
                        input.setAttribute('autocomplete', 'off');
                        setTimeout(() => {
                            input.setAttribute('autocomplete', 'new-password');
                        }, 1);
                    }
                });
            });
        }
        
        // Función para filtrar cajeros
        function filtrarCajeros() {
            const busqueda = document.getElementById('buscar-cajero').value.toLowerCase();
            const cajeros = document.querySelectorAll('.cajero-item');
            
            cajeros.forEach(cajero => {
                const texto = cajero.textContent.toLowerCase();
                cajero.style.display = texto.includes(busqueda) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
